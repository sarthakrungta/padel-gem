# railway.toml
# Railway reads this file to configure your deployment.
# The poller runs as a cron job every 5 minutes.
# Docs: https://docs.railway.app/reference/config-as-code

[deploy]
startCommand = "python recover_may2.py && python db.py --init && python playtomic_tracker.py --loop"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5